spring.application.name=products-service
server.port=8081

spring.datasource.url=jdbc:postgresql://products-db:5432/products_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

services.api-key=super-secret-api-key

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=products-service
info.app.description=Products microservice for technical test
info.app.version=1.0.0

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n