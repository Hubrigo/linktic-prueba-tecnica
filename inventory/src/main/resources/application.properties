spring.application.name=inventory-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/inventory_db
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

products.service.base-url=http://localhost:8081
services.api-key=super-secret-api-key

resilience4j.retry.instances.productsService.max-attempts=3
resilience4j.retry.instances.productsService.wait-duration=500ms

resilience4j.timelimiter.instances.productsService.timeout-duration=2s

resilience4j.circuitbreaker.instances.productsService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productsService.minimum-number-of-calls=4
resilience4j.circuitbreaker.instances.productsService.sliding-window-size=8
resilience4j.circuitbreaker.instances.productsService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.productsService.permitted-number-of-calls-in-half-open-state=2

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=inventory-service
info.app.description=Inventory microservice for technical test
info.app.version=1.0.0

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n