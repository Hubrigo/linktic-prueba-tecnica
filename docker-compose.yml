version: "3.8"

services:
  products-db:
    image: postgres:15
    container_name: products-db
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - products_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:15
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - inventory_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  products-service:
    build:
      context: ./products
    container_name: products-service
    ports:
      - "8081:8081"
    depends_on:
      products-db:
        condition: service_healthy
    networks:
      - microservices-net

  inventory-service:
    build:
      context: ./inventory
    container_name: inventory-service
    ports:
      - "8082:8082"
    depends_on:
      inventory-db:
        condition: service_healthy
      products-service:
        condition: service_started
    networks:
      - microservices-net

volumes:
  products_data:
  inventory_data:

networks:
  microservices-net:
    driver: bridge